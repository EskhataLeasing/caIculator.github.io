<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Eskhata Leasing — Калькулятор</title>
<link rel="icon" type="image/png" href="favicon.png">
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<style>
:root{
  --blue:#1a4fa0;--blue-l:#2563c7;--accent:#6c63ff;
  --bg:#eef1f7;--card:#fff;--text:#0f1923;--muted:#6b7a8d;
  --border:#dde3ed;--shadow:0 2px 16px rgba(26,79,160,.08);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Manrope',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}

header{
  background:var(--card);
  border-bottom:1px solid var(--border);
  padding:0 40px;
  height:60px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  position:sticky;
  top:0;
  z-index:100;
  box-shadow:0 1px 8px rgba(26,79,160,.06);
}

.logo{
  display:flex;
  align-items:center;
  gap:10px;
  font-size:20px;
  font-weight:800;
  color:var(--text);
  text-decoration:none;
}

.logo-img{
  height:36px;
  width:auto;
  object-fit:contain;
}

.logo-icon{
  width:36px;
  height:36px;
  background:var(--blue);
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  color:#fff;
  font-size:18px;
  font-weight:800;
}

.lang-sw{
  display:flex;
  gap:14px;
}

.lang-sw a{
  font-size:13px;
  font-weight:600;
  color:var(--muted);
  cursor:pointer;
  transition:.2s;
}

.lang-sw a.active,
.lang-sw a:hover{
  color:var(--blue);
}

main{
  max-width:1120px;
  margin:0 auto;
  padding:36px 24px 60px;
}

.grid{
  display:grid;
  grid-template-columns:380px 1fr;
  gap:24px;
}

.card{
  background:var(--card);
  border-radius:16px;
  padding:28px;
  box-shadow:var(--shadow);
}
  /* ── TYPE SWITCHER ── */
.type-sw{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:8px;
  margin-bottom:20px;
}

.type-btn{
  padding:11px 8px;
  border:2px solid var(--border);
  border-radius:10px;
  background:#f8fafd;
  font-size:13px;
  font-weight:700;
  color:var(--muted);
  cursor:pointer;
  transition:.2s;
}

.type-btn.active{
  border-color:var(--blue);
  background:#eef4ff;
  color:var(--blue);
}

/* ── FORM ── */
.fg{margin-bottom:16px}

label{
  font-size:11px;
  font-weight:700;
  color:var(--muted);
  margin-bottom:5px;
  display:block;
}

input{
  width:100%;
  padding:10px 14px;
  border:1.5px solid var(--border);
  border-radius:10px;
  font-size:15px;
  background:#f8fafd;
}

.iw{position:relative}
.isuf{
  position:absolute;
  right:12px;
  top:50%;
  transform:translateY(-50%);
  font-size:13px;
  color:var(--muted);
}

.btn{
  width:100%;
  padding:12px;
  border:none;
  border-radius:10px;
  font-weight:700;
  cursor:pointer;
  margin-top:8px;
}

.btn-p{
  background:linear-gradient(135deg,var(--blue),var(--accent));
  color:#fff;
}

.btn-s{
  background:#111;
  color:#fff;
}
  /* ── RESULT CARDS ── */
.rg{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:11px;
}

.rc{
  background:#f4f7fb;
  border-radius:12px;
  padding:13px 15px;
  border:1px solid var(--border);
}

.rc.full{grid-column:1/-1}

.cl{
  font-size:10px;
  color:var(--muted);
  font-weight:700;
  margin-bottom:4px;
}

.cv{
  font-size:18px;
  font-weight:800;
}

.cs{
  font-size:11px;
  color:var(--muted);
}

/* internal row */
.int-row{
  grid-column:1/-1;
  background:#fff7ed;
  border:1px solid #fcd9a0;
  border-radius:12px;
  padding:13px 15px;
}

/* commission row */
.comm-row{
  grid-column:1/-1;
  background:#f0fdf4;
  border:1px solid #a7f3d0;
  border-radius:12px;
  padding:13px 15px;
}

.comm-inp-row{
  display:flex;
  gap:10px;
  align-items:center;
}

.comm-amt{
  font-size:13px;
  font-weight:600;
}

/* fee row */
.fee-row{
  grid-column:1/-1;
  background:#fdf4ff;
  border:1px solid #e9d5ff;
  border-radius:12px;
  padding:13px 15px;
}

/* schedule */
.sched-sec{margin-top:22px}

table{
  width:100%;
  border-collapse:collapse;
}

thead{
  background:var(--blue);
  color:#fff;
}

thead th{
  padding:8px;
  font-size:11px;
}

tbody td{
  padding:6px;
  border-bottom:1px solid #eee;
}
  /* ── CLIENT MODE ── */
body.cm header{display:none}
body.cm .form-card{display:none}
body.cm .grid{grid-template-columns:1fr}
body.cm .int-row{display:none!important}
body.cm .comm-row{display:none!important}

/* mobile */
@media(max-width:640px){
  .grid{grid-template-columns:1fr}
  main{padding:16px}
}

/* print */
@media print{
  body>header,body>main{display:none}
  #printDoc{display:block}
}
</style>
</head>

<body>

<header>
  <div class="logo">
    <img src="logo.png" class="logo-img">
  </div>
  <div class="lang-sw">
    <a class="active">RU</a>
    <a>UZ</a>
    <a>ENG</a>
  </div>
</header>

<main>
<div class="grid">

<!-- FORM -->
<div class="card form-card">

<div class="type-sw">
  <button class="type-btn active" onclick="switchType('rassrochka')">Рассрочка</button>
  <button class="type-btn" onclick="switchType('leasing')">Лизинг</button>
</div>

<div class="fg">
  <label>Стоимость объекта</label>
  <input id="price" type="text">
</div>

<div class="fg">
  <label>Аванс</label>
  <div class="iw">
    <input id="advPct" type="number">
    <span class="isuf">%</span>
  </div>
</div>

<div class="fg">
  <label>Срок</label>
  <input id="term" type="number">
</div>

<button class="btn btn-p" onclick="calculate()">Рассчитать</button>
<button class="btn btn-s" onclick="enterCM()">Для клиента</button>

</div>

<!-- RESULTS -->
<div id="resultsPanel">
<div id="resultCards"></div>

<div id="schedSec" class="sched-sec" style="display:none">
  <div class="card">
    <table>
      <thead id="schedHead"></thead>
      <tbody id="schedBody"></tbody>
      <tfoot id="schedFoot"></tfoot>
    </table>
  </div>
</div>

<div class="act-btns" id="actBtns">
  <button onclick="doPrint()">Печать</button>
</div>

</div>
</div>
</main>

<!-- PRINT -->
<div id="printDoc" style="display:none">
  <table id="pdTop"></table>
  <table id="pdCond"></table>
  <table id="pdSign"></table>
  <table id="pdDebt"></table>

  <table>
    <thead id="pdSchedHead"></thead>
    <tbody id="pdSchedBody"></tbody>
    <tfoot id="pdSchedFoot"></tfoot>
  </table>
</div>

<script>

/* STATE */
let mode='rassrochka';
let R=null;

/* SWITCH */
function switchType(m){
  mode=m;
  R=null;
  document.getElementById('resultCards').innerHTML='';
}

/* FORMAT */
function parseVal(v){
  return parseFloat(String(v).replace(/[^\d.]/g,''))||0;
}

function fmt(n){
  return Math.round(n).toLocaleString('ru-RU');
}

function fmtPct(n){
  return (n*100).toFixed(2)+'%';
}
  
/* === РАССРОЧКА === */
const TARGET_IRR=0.30;
const IRR_STEP=0.0001;
const DISC_STEP=0.0005;
const DISC_MAX=0.5;
const REG_FEE=1000000;

function ceilTo(v,s){
  return Math.ceil((v+s-1e-7)/s)*s;
}

function calcNominalIRR(cfs){
  let lo=-0.9999,hi=100;

  for(let i=0;i<300;i++){
    let mid=(lo+hi)/2;
    let npv=0;

    for(let j=0;j<cfs.length;j++){
      npv+=cfs[j]/Math.pow(1+mid,j);
    }

    if(Math.abs(npv)<0.01) return mid*12;
    if(npv>0) lo=mid; else hi=mid;
  }

  return 0;
}

function buildCF(price,advance,debt,term,disc){
  let da=price*disc;
  let vat=da*12/112;
  let cf0=advance-(price-da+vat+REG_FEE);

  let cfs=[cf0];
  for(let i=1;i<=term;i++){
    cfs.push(debt/term);
  }
  return cfs;
}

function findDiscount(price,advance,debt,term){
  let d=DISC_STEP;

  while(d<=DISC_MAX){
    let irr=calcNominalIRR(buildCF(price,advance,debt,term,d));

    if(irr>0 && ceilTo(irr,IRR_STEP)>=TARGET_IRR){
      return d;
    }

    d+=DISC_STEP;
  }

  return -1;
}
  
/* === ЛИЗИНГ === */
const LEASING_RATE = 0.2975;
const LEASING_COMM = 0.035;
const INSURANCE_PCT = 0.0016;

function buildScheduleRassrochka(debt,term){
  let rows=[];
  let mp=debt/term;
  let bal=debt;

  for(let i=1;i<=term;i++){
    let pay=(i===term)?bal:mp;
    bal=Math.max(0,bal-pay);

    rows.push({
      n:i,
      pay:pay,
      bal:bal
    });
  }

  rows._t={
    pay:debt
  };

  return rows;
}

function buildScheduleLeasing(debt,term){
  let rate=LEASING_RATE/12;
  let rows=[];
  let bal=debt;

  let pay;
  if(rate===0){
    pay=debt/term;
  } else {
    let pv=(1+rate)**term;
    pay=debt*(rate*pv)/(pv-1);
  }

  let totPay=0,totPr=0,totInt=0;

  for(let i=1;i<=term;i++){
    let intr=bal*rate;
    let princ=pay-intr;

    if(i===term){
      princ=bal;
      pay=princ+intr;
    }

    bal=Math.max(0,bal-princ);

    totPay+=pay;
    totPr+=princ;
    totInt+=intr;

    rows.push({
      n:i,
      pay,
      princ,
      intr,
      bal
    });
  }

  rows._t={
    pay:totPay,
    princ:totPr,
    intr:totInt
  };

  return rows;
}
  
/* === CALCULATE === */
function calculate(){
  let price=parseVal(document.getElementById('price').value);
  let advPct=parseVal(document.getElementById('advPct').value)/100;
  let term=parseInt(document.getElementById('term').value)||0;

  if(price<=0){alert('Введите стоимость');return;}
  if(term<=0){alert('Введите срок');return;}

  if(mode==='rassrochka'){
    calcRassrochka(price,advPct,term);
  } else {
    calcLeasing(price,advPct,term);
  }
}

/* === РАССРОЧКА === */
function calcRassrochka(price,advPct,term){
  if(advPct<=0 || advPct>=1){
    alert('Введите корректный аванс');
    return;
  }

  let advance=price*advPct;
  let debt=price-advance;

  let disc=findDiscount(price,advance,debt,term);
  if(disc<0){
    alert('Ошибка расчета дисконта');
    return;
  }

  let discAmt=price*disc;
  let monthPay=debt/term;
  let totalPay=advance + monthPay*term;

  let schedule=buildScheduleRassrochka(debt,term);

  R={
    mode:'rassrochka',
    price,
    advance,
    advPct,
    debt,
    term,
    foundDisc:disc,
    discAmt,
    totalPay,
    schedule
  };

  renderResults(R);
}

/* === ЛИЗИНГ === */
function calcLeasing(price,advPct,term){
  let advance=price*advPct;
  let debt=price-advance;

  let commAmt=price*LEASING_COMM;
  let insurance=price*INSURANCE_PCT;

  let schedule=buildScheduleLeasing(debt,term);
  let tot=schedule._t;

  let flatRate=(tot.intr)/(debt*term/12);
  let totalPay=advance + tot.pay;

  R={
    mode:'leasing',
    price,
    advance,
    advPct,
    debt,
    term,
    commAmt,
    insurance,
    schedule,
    tot,
    totalPay,
    flatRate
  };

  renderResults(R);
}
  /* === RENDER === */
function renderResults(r){
  let cardsHTML='';

  if(r.mode==='rassrochka'){

    cardsHTML=`
      <div class="rc">
        <div class="cl">Долг лизинга</div>
        <div class="cv">${fmt(r.debt)}</div>
      </div>

      <div class="rc">
        <div class="cl">Аванс</div>
        <div class="cv">${fmt(r.advance)}</div>
        <div class="cs">${(r.advPct*100).toFixed(0)}%</div>
      </div>

      <div class="rc full">
        <div class="cl">Общая сумма оплаты</div>
        <div class="cv">${fmt(r.totalPay)}</div>
      </div>

      <!-- 🔥 ВМЕСТО ВНУТРЕННЕГО ДИСКОНТА -->
      <div class="fee-row">
        <div class="cl">Единоразовый % для клиента</div>
        <div class="cv">${fmtPct(r.foundDisc)}</div>
        <div class="cs">${fmt(r.discAmt)}</div>
      </div>
    `;

    /* schedule */
    document.getElementById('schedHead').innerHTML=`
      <tr>
        <th>№</th>
        <th>Сумма платежа</th>
        <th>Остаток долга</th>
      </tr>`;

    let tbody=document.getElementById('schedBody');
    tbody.innerHTML='';

    r.schedule.forEach(row=>{
      let tr=document.createElement('tr');
      tr.innerHTML=`
        <td>${row.n}</td>
        <td>${fmt(row.pay)}</td>
        <td>${fmt(row.bal)}</td>
      `;
      tbody.appendChild(tr);
    });

    document.getElementById('schedFoot').innerHTML=`
      <tr>
        <td>Итого</td>
        <td>${fmt(r.schedule._t.pay)}</td>
        <td>—</td>
      </tr>`;

  } else {

    cardsHTML=`
      <div class="rc">
        <div class="cl">Долг лизинга</div>
        <div class="cv">${fmt(r.debt)}</div>
      </div>

      <div class="rc">
        <div class="cl">Аванс</div>
        <div class="cv">${fmt(r.advance)}</div>
        <div class="cs">${(r.advPct*100).toFixed(0)}%</div>
      </div>

      <div class="rc">
        <div class="cl">Общая сумма оплаты</div>
        <div class="cv">${fmt(r.totalPay)}</div>
      </div>

      <div class="rc">
        <div class="cl">Ставка лизинга</div>
        <div class="cv">${fmtPct(r.flatRate)}</div>
      </div>

      <!-- 🔥 ФИКС 3.5% -->
      <div class="fee-row">
        <div class="cl">Комиссия за оформление (клиент)</div>
        <div class="cv">3.50%</div>
        <div class="cs">${fmt(r.commAmt)}</div>
      </div>
    `;

    document.getElementById('schedHead').innerHTML=`
      <tr>
        <th>№</th>
        <th>Платёж</th>
        <th>Осн. долг</th>
        <th>Проценты</th>
        <th>Остаток</th>
      </tr>`;

    let tbody=document.getElementById('schedBody');
    tbody.innerHTML='';

    r.schedule.forEach(row=>{
      let tr=document.createElement('tr');
      tr.innerHTML=`
        <td>${row.n}</td>
        <td>${fmt(row.pay)}</td>
        <td>${fmt(row.princ)}</td>
        <td>${fmt(row.intr)}</td>
        <td>${fmt(row.bal)}</td>
      `;
      tbody.appendChild(tr);
    });

    let tot=r.tot;

    document.getElementById('schedFoot').innerHTML=`
      <tr>
        <td>Итого</td>
        <td>${fmt(tot.pay)}</td>
        <td>${fmt(tot.princ)}</td>
        <td>${fmt(tot.intr)}</td>
        <td>—</td>
      </tr>`;
  }

  document.getElementById('resultCards').innerHTML=`
    <div class="card" style="margin-bottom:11px">
      <div class="rg">${cardsHTML}</div>
    </div>`;

  document.getElementById('schedSec').style.display='block';
  document.getElementById('actBtns').classList.add('vis');
}
  /* === PRINT === */
function buildPrintDoc(r){

  let contractTotal;

  if(r.mode==='leasing'){
    contractTotal = r.advance + r.tot.pay + r.commAmt + r.insurance;
  } else {
    contractTotal = r.totalPay;
  }

  document.getElementById('pdTop').innerHTML=`
    <tr>
      <td>Стоимость объекта</td>
      <td>${fmt(r.price)}</td>
    </tr>
    <tr>
      <td>Общая сумма договора</td>
      <td>${fmt(contractTotal)}</td>
    </tr>
  `;

  document.getElementById('pdDebt').innerHTML=`
    <tr>
      <td>Долг</td>
      <td>${fmt(r.debt)}</td>
    </tr>
  `;

  if(r.mode==='rassrochka'){
    document.getElementById('pdSchedHead').innerHTML=`
      <tr>
        <th>Месяц</th>
        <th>Платёж</th>
        <th>Остаток</th>
      </tr>`;
  } else {
    document.getElementById('pdSchedHead').innerHTML=`
      <tr>
        <th>№</th>
        <th>Платёж</th>
        <th>Осн. долг</th>
        <th>Проценты</th>
        <th>Остаток</th>
      </tr>`;
  }

  let rows='';

  if(r.mode==='rassrochka'){
    rows = r.schedule.map(row=>`
      <tr>
        <td>${row.n}</td>
        <td>${fmt(row.pay)}</td>
        <td>${fmt(row.bal)}</td>
      </tr>
    `).join('');
  } else {
    rows = r.schedule.map(row=>`
      <tr>
        <td>${row.n}</td>
        <td>${fmt(row.pay)}</td>
        <td>${fmt(row.princ)}</td>
        <td>${fmt(row.intr)}</td>
        <td>${fmt(row.bal)}</td>
      </tr>
    `).join('');
  }

  document.getElementById('pdSchedBody').innerHTML=rows;
}

/* === CLIENT MODE === */
function enterCM(){
  if(!R){
    alert('Сначала рассчитайте');
    return;
  }
  document.body.classList.add('cm');
}

function exitCM(){
  document.body.classList.remove('cm');
}

/* === PRINT ACTION === */
function doPrint(){
  if(!R)return;
  buildPrintDoc(R);
  setTimeout(()=>window.print(),100);
}

</script>
</body>
</html>
