<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Eskhata Leasing — Калькулятор</title>

<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<style>
body{font-family:'Manrope',sans-serif;background:#eef1f7;margin:0}
main{max-width:1100px;margin:40px auto;display:grid;grid-template-columns:350px 1fr;gap:20px}
.card{background:#fff;padding:20px;border-radius:14px}

input{width:100%;padding:10px;margin-bottom:10px;border-radius:8px;border:1px solid #ccc}

button{width:100%;padding:12px;border:none;border-radius:10px;font-weight:700;cursor:pointer}
.btn-p{background:#4f46e5;color:#fff}
.btn-s{background:#111;color:#fff}

.rc{background:#f4f7fb;padding:12px;border-radius:10px;margin-bottom:10px}
.cl{font-size:12px;color:#777}
.cv{font-size:18px;font-weight:800}

.comm-row{background:#ecfdf5;padding:15px;border-radius:12px;margin-top:10px}
.fee-row{background:#fdf4ff;padding:15px;border-radius:12px;margin-top:10px}

table{width:100%;margin-top:10px;border-collapse:collapse}
td,th{padding:6px;border-bottom:1px solid #eee;text-align:right}
th:first-child,td:first-child{text-align:left}
</style>
</head>

<body>

<main>

<!-- LEFT -->
<div class="card">
  <input id="price" placeholder="Стоимость">
  <input id="advPct" placeholder="Аванс %">
  <input id="term" placeholder="Срок (мес)">

  <button class="btn-p" onclick="calculate()">Рассчитать</button>
</div>

<!-- RIGHT -->
<div>
  <div id="results"></div>
  <table id="table"></table>
</div>

</main>

<script>

/* === CONFIG === */
const TARGET_IRR=0.3;
const DISC_STEP=0.0005;
const DISC_MAX=0.5;
const REG_FEE=1000000;
const LEASING_COMM=0.035;

/* === UTILS === */
function parse(v){return parseFloat(v)||0}
function fmt(n){return Math.round(n).toLocaleString('ru-RU')}
function pct(n){return (n*100).toFixed(2)+'%'}

/* === IRR === */
function irr(cfs){
  let lo=-0.9999,hi=100;
  for(let i=0;i<300;i++){
    let mid=(lo+hi)/2;
    let npv=0;
    for(let j=0;j<cfs.length;j++){
      npv+=cfs[j]/Math.pow(1+mid,j);
    }
    if(Math.abs(npv)<0.01)return mid*12;
    if(npv>0)lo=mid; else hi=mid;
  }
  return 0;
}

/* === FIND DISCOUNT === */
function findDisc(price,adv,debt,term){
  let d=DISC_STEP;
  while(d<=DISC_MAX){
    let da=price*d;
    let vat=da*12/112;
    let cf0=adv-(price-da+vat+REG_FEE);
    let cfs=[cf0];
    for(let i=1;i<=term;i++)cfs.push(debt/term);
    let r=irr(cfs);
    if(r>=TARGET_IRR)return d;
    d+=DISC_STEP;
  }
  return 0;
}

/* === CALC === */
function calculate(){
  const price=parse(document.getElementById('price').value);
  const advPct=parse(document.getElementById('advPct').value)/100;
  const term=parse(document.getElementById('term').value);

  const advance=price*advPct;
  const debt=price-advance;

  const disc=findDisc(price,advance,debt,term);
  const discAmt=price*disc;

  /* === RENDER === */

  document.getElementById('results').innerHTML=`

    <div class="rc">
      <div class="cl">Долг</div>
      <div class="cv">${fmt(debt)}</div>
    </div>

    <div class="rc">
      <div class="cl">Аванс</div>
      <div class="cv">${fmt(advance)}</div>
    </div>

    <div class="comm-row">
      <div class="cl">Единоразовый % для клиента</div>
      <div class="cv">${pct(disc)}</div>
      <div>${fmt(discAmt)}</div>
    </div>

  `;

  /* === TABLE === */
  let html="<tr><th>Мес</th><th>Платёж</th><th>Остаток</th></tr>";
  let bal=debt;

  for(let i=1;i<=term;i++){
    let pay=debt/term;
    bal-=pay;
    html+=`<tr>
      <td>${i}</td>
      <td>${fmt(pay)}</td>
      <td>${fmt(Math.max(bal,0))}</td>
    </tr>`;
  }

  document.getElementById('table').innerHTML=html;
}

</script>

</body>
</html>
