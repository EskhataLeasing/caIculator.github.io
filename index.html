<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Eskhata Leasing — Калькулятор</title>
<link rel="icon" type="image/png" href="favicon.png">
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --blue:#1a4fa0;--blue-l:#2563c7;--accent:#6c63ff;
  --bg:#eef1f7;--card:#fff;--text:#0f1923;--muted:#6b7a8d;
  --border:#dde3ed;--shadow:0 2px 16px rgba(26,79,160,.08);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Manrope',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}

header{
  background:var(--card);border-bottom:1px solid var(--border);
  padding:0 40px;height:60px;display:flex;align-items:center;
  justify-content:space-between;position:sticky;top:0;z-index:100;
  box-shadow:0 1px 8px rgba(26,79,160,.06);
}
.logo{display:flex;align-items:center;gap:10px;font-size:20px;font-weight:800;color:var(--text);text-decoration:none}
.logo-img{height:36px;width:auto;object-fit:contain;flex-shrink:0}
.logo-icon{width:36px;height:36px;background:var(--blue);border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;font-size:18px;font-weight:800;flex-shrink:0}
.lang-sw{display:flex;gap:14px}
.lang-sw a{font-size:13px;font-weight:600;color:var(--muted);text-decoration:none;cursor:pointer;transition:color .2s}
.lang-sw a:hover,.lang-sw a.active{color:var(--blue)}

main{max-width:1120px;margin:0 auto;padding:36px 24px 60px}
.grid{display:grid;grid-template-columns:380px 1fr;gap:24px;align-items:start}
.card{background:var(--card);border-radius:16px;padding:28px;box-shadow:var(--shadow)}

/* ── TYPE SWITCHER ── */
.type-sw{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:20px}
.type-btn{
  padding:11px 8px;border:2px solid var(--border);border-radius:10px;
  background:#f8fafd;font-family:'Manrope',sans-serif;font-size:13px;
  font-weight:700;color:var(--muted);cursor:pointer;transition:all .2s;text-align:center;
}
.type-btn.active{
  border-color:var(--blue);background:#eef4ff;color:var(--blue);
}

/* ── FORM ── */
.fg{margin-bottom:16px}
label{display:block;font-size:11px;font-weight:700;color:var(--muted);margin-bottom:5px;text-transform:uppercase;letter-spacing:.5px}
input[type=text],input[type=number]{
  width:100%;padding:10px 14px;border:1.5px solid var(--border);border-radius:10px;
  font-size:15px;font-family:'Manrope',sans-serif;font-weight:500;color:var(--text);
  background:#f8fafd;transition:border-color .2s,box-shadow .2s;outline:none;
}
input:focus{border-color:var(--blue-l);box-shadow:0 0 0 3px rgba(37,99,199,.1);background:#fff}
.iw{position:relative}
.iw input{padding-right:52px}
.isuf{position:absolute;right:14px;top:50%;transform:translateY(-50%);font-size:13px;color:var(--muted);font-weight:600;pointer-events:none}

.btn{width:100%;padding:12px;border:none;border-radius:10px;font-family:'Manrope',sans-serif;font-size:15px;font-weight:700;cursor:pointer;transition:all .2s;margin-top:5px}
.btn-p{background:linear-gradient(135deg,var(--blue),var(--accent));color:#fff}
.btn-p:hover{box-shadow:0 4px 16px rgba(108,99,255,.35);transform:translateY(-1px)}
.btn-s{background:var(--text);color:#fff}
.btn-s:hover{background:#1e2a38;transform:translateY(-1px)}
  /* ── RESULT CARDS ── */
.rg{display:grid;grid-template-columns:1fr 1fr;gap:11px}
.rc{background:#f4f7fb;border-radius:12px;padding:13px 15px;border:1px solid var(--border)}
.rc.full{grid-column:1/-1}
.rc.hi{background:#eef4ff;border-color:#c7d8f7}
.cl{font-size:10px;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px}
.cv{font-size:18px;font-weight:800;color:var(--text);letter-spacing:-.4px}
.cs{font-size:11px;color:var(--muted);margin-top:2px;font-weight:500}

/* internal row (рассрочка — дисконт) */
.int-row{grid-column:1/-1;background:#fff7ed;border:1px solid #fcd9a0;border-radius:12px;padding:13px 15px;display:flex;align-items:center;justify-content:space-between}
.int-row .cl{color:#92400e}
.int-row .cv{font-size:18px;font-weight:800;color:#b45309}
.int-badge{font-size:10px;background:#fef3c7;color:#92400e;border-radius:6px;padding:3px 8px;font-weight:700;border:1px solid #fcd9a0;white-space:nowrap}

/* commission row */
.comm-row{grid-column:1/-1;background:#f0fdf4;border:1px solid #a7f3d0;border-radius:12px;padding:13px 15px}
.comm-row .cl{color:#065f46;margin-bottom:8px}
.comm-inp-row{display:flex;align-items:center;gap:10px}
.comm-inp-row input{width:120px;padding:8px 32px 8px 12px;border:1.5px solid #6ee7b7;border-radius:8px;font-size:14px;font-family:'Manrope',sans-serif;font-weight:600;color:#065f46;background:#fff;outline:none}
.comm-amt{font-size:13px;color:#065f46;font-weight:600}

/* client fee row */
.fee-row{grid-column:1/-1;background:#fdf4ff;border:1px solid #e9d5ff;border-radius:12px;padding:13px 15px}
.fee-row .cl{color:#6b21a8;margin-bottom:4px}
.fee-row .cv{font-size:18px;font-weight:800;color:#7c3aed}

/* ── SCHEDULE ── */
.sched-sec{margin-top:22px}
.sec-title{font-size:15px;font-weight:700;margin-bottom:11px}
table{width:100%;border-collapse:collapse;font-size:13px}
thead tr{background:var(--blue);color:#fff}
thead th{padding:9px 11px;text-align:left;font-weight:600;font-size:10px;text-transform:uppercase;letter-spacing:.4px}
tbody tr:nth-child(even){background:#f8fafd}
tbody tr:hover{background:#eef4ff}
tbody td{padding:6px 11px;border-bottom:1px solid #f0f3f8;font-weight:500}
tbody td:not(:first-child){text-align:right}
tfoot tr{background:#e8eef8;font-weight:700}
tfoot td{padding:8px 11px;border-top:2px solid var(--blue)}
tfoot td:not(:first-child){text-align:right}

.empty-r{text-align:center;padding:44px 20px;color:var(--muted)}
.empty-r svg{opacity:.3;margin:0 auto 12px;display:block}
.empty-r p{font-size:14px;font-weight:500}

.act-btns{display:none;margin-top:14px;gap:10px}
.act-btns.vis{display:flex}
.btn-print{padding:10px 20px;background:var(--blue);color:#fff;border:none;border-radius:8px;font-family:'Manrope',sans-serif;font-size:14px;font-weight:700;cursor:pointer;transition:.2s}
.btn-print:hover{background:var(--blue-l)}
.btn-exit{display:none;padding:10px 20px;background:#e2e8f0;color:var(--text);border:none;border-radius:8px;font-family:'Manrope',sans-serif;font-size:14px;font-weight:700;cursor:pointer}

/* ── CLIENT MODE ── */
body.cm header{display:none}
body.cm main{padding:16px}
body.cm .form-card{display:none}
body.cm .grid{grid-template-columns:1fr}
body.cm .btn-exit{display:inline-block}
body.cm .int-row{display:none!important}
body.cm .comm-row{display:none!important}

.csh{display:none;align-items:center;gap:14px;margin-bottom:16px;padding-bottom:12px;border-bottom:2px solid var(--blue)}
body.cm .csh{display:flex}
.pt{font-size:18px;font-weight:800}
.ps{font-size:12px;color:var(--muted);margin-top:2px}

#printDoc{position:absolute;left:-9999px;top:0;width:210mm;visibility:hidden;pointer-events:none}

/* ── MOBILE ── */
@media(max-width:640px){
  header{padding:0 16px;height:54px}
  .logo-icon{width:30px;height:30px;font-size:15px}
  .lang-sw{gap:10px}
  main{padding:16px 12px 40px}
  .grid{grid-template-columns:1fr!important;gap:16px}
  .card{padding:16px 13px;border-radius:12px}
  .fg{margin-bottom:12px}
  input[type=text],input[type=number]{font-size:16px;padding:9px 12px}
  .btn{padding:11px;font-size:14px}
  .rg{grid-template-columns:1fr 1fr;gap:8px}
  .cv{font-size:15px}
  .sched-sec .card{overflow-x:auto}
  table{font-size:11px;min-width:280px}
  thead th{padding:7px 8px;font-size:9px}
  tbody td{padding:5px 8px}
  .act-btns{flex-direction:column}
  .btn-print,.btn-exit{width:100%;text-align:center}
  .int-row{flex-direction:column;align-items:flex-start;gap:6px}
  .int-badge{align-self:flex-end}
}
@media(min-width:641px) and (max-width:860px){
  .grid{grid-template-columns:1fr!important}
  main{padding:24px 16px 50px}
}
  /* ── PRINT ── */
@media print{
  @page{size:A4 portrait;margin:8mm 10mm}
  *{-webkit-print-color-adjust:exact!important;print-color-adjust:exact!important}
  body>header,body>main,.act-btns{display:none!important}
  body{background:#fff;margin:0;padding:0}
  #printDoc{display:block!important;position:static!important;left:auto!important;top:auto!important;visibility:visible!important;width:100%;font-family:Arial,Helvetica,sans-serif;font-size:8pt;color:#000}
  .pd-logo-box{display:table;border:1pt solid #1a4fa0;border-radius:4pt;padding:4pt 10pt;margin-bottom:6pt}
  .pd-logo-inner{display:table-cell;vertical-align:middle}
  .pd-top{width:100%;border-collapse:collapse;margin-bottom:4pt;font-size:8pt}
  .pd-top td{padding:3pt 6pt;border:.5pt solid #b0bac8}
  .pt-lbl{color:#222;width:62%}
  .pt-val{font-weight:700;text-align:right;font-size:8.5pt}
  .pd-cond{width:100%;border-collapse:collapse;margin-bottom:4pt;font-size:8pt}
  .pd-cond-head td{background:#d0daea!important;font-weight:700;text-align:center;padding:3pt 6pt;border:.5pt solid #b0bac8;font-size:8pt}
  .pd-cond td{padding:3pt 6pt;border:.5pt solid #b0bac8;vertical-align:middle}
  .pc-lbl{color:#222;width:52%}
  .pc-mid{color:#555;font-size:7.5pt;text-align:center;width:10%}
  .pc-val{font-weight:700;text-align:right}
  .pd-cond .pc-alt td{background:#f0f3f9!important}
  .pd-sign{width:100%;border-collapse:collapse;margin-bottom:4pt;font-size:8pt}
  .pd-sign td{padding:3pt 6pt;border:.5pt solid #b0bac8}
  .ps-lbl{color:#222;font-weight:600;width:62%}
  .ps-val{font-weight:700;text-align:right;font-size:8.5pt}
  .pd-debt{width:100%;border-collapse:collapse;margin-bottom:6pt;font-size:8pt}
  .pd-debt td{padding:3pt 6pt;border:.5pt solid #b0bac8}
  .pdl{color:#222;width:62%}
  .pdv{font-weight:700;text-align:right}
  .pd-sched-wrap{border:.5pt solid #b0bac8}
  .pd-sched-hd{font-size:8pt;font-weight:700;text-align:center;padding:3pt;background:#eef2f8;border-bottom:.5pt solid #b0bac8}
  .pd-sched{width:100%;border-collapse:collapse;font-size:7.5pt}
  .pd-sched thead tr{background:#fff}
  .pd-sched thead th{color:#333;padding:3pt 5pt;text-align:center;font-weight:600;font-size:7.5pt;border-bottom:.5pt solid #b0bac8;border-right:.5pt solid #d0d8e8}
  .pd-sched .sched-sub td{font-weight:700;text-align:right;padding:2pt 5pt;font-size:7.5pt;border-bottom:.5pt solid #b0bac8;border-right:.5pt solid #d0d8e8;background:#f8f9fc}
  .pd-sched .sched-sub td:first-child{text-align:center}
  .pd-sched tbody td{padding:1.8pt 5pt;border-bottom:.3pt solid #e8ecf2;border-right:.3pt solid #e8ecf2;text-align:right}
  .pd-sched tbody td:first-child{text-align:center;color:#333}
  .pd-sched tbody tr:last-child td{border-bottom:none}
}
</style>
</head>
<body>

<header>
  <a class="logo" href="#">
    <img class="logo-img" src="logo.png" alt="Eskhata Leasing"
      onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
    <div class="logo-icon" style="display:none">Э</div>
  </a>
  <div class="lang-sw">
    <a class="active" onclick="setLang('ru')">RU</a>
    <a onclick="setLang('uz')">UZ</a>
    <a onclick="setLang('en')">ENG</a>
  </div>
</header>

<main>
  <div class="grid">

    <!-- ФОРМА -->
    <div class="card form-card">

      <div class="type-sw">
        <button class="type-btn active" id="btnRass" onclick="switchType('rassrochka')">
          Рассрочка
        </button>
        <button class="type-btn" id="btnLeas" onclick="switchType('leasing')">
          Лизинг (аннуитет)
        </button>
      </div>

      <div class="fg">
        <label data-i18n="obj_price">Стоимость объекта</label>
        <input type="text" id="price" oninput="formatInput(this)" placeholder="0">
      </div>

      <div class="fg">
        <label data-i18n="advance_pct">Аванс (%)</label>
        <div class="iw">
          <input type="number" id="advPct" min="0" max="99" step="1" placeholder="30">
          <span class="isuf">%</span>
        </div>
      </div>

      <div class="fg">
        <label data-i18n="term_months">Срок (мес.)</label>
        <input type="number" id="term" min="1" max="120" step="1" placeholder="24">
      </div>

      <button class="btn btn-p" onclick="calculate()">Рассчитать</button>
      <button class="btn btn-s" style="margin-top:8px" onclick="enterCM()">Режим для клиента</button>
    </div>

    <!-- РЕЗУЛЬТАТЫ -->
    <div id="resultsPanel">
            <div id="resultCards"></div>

      <div id="schedSec" class="sched-sec" style="display:none">
        <div class="sec-title">График платежей</div>
        <div class="card" style="padding:0;overflow:hidden">
          <table>
            <thead id="schedHead"></thead>
            <tbody id="schedBody"></tbody>
            <tfoot id="schedFoot"></tfoot>
          </table>
        </div>
      </div>

      <div class="act-btns" id="actBtns">
        <button class="btn-print" onclick="doPrint()">🖨 Распечатать</button>
        <button class="btn-exit" onclick="exitCM()">← Назад</button>
      </div>
    </div>
  </div>
</main>

<script>

/* === ЛОГИКА БЕЗ ИЗМЕНЕНИЙ ДО renderResults === */

/* 🔥 ГЛАВНОЕ ИЗМЕНЕНИЕ */
function renderResults(r){
  let cardsHTML='';

  if(r.mode==='rassrochka'){

    cardsHTML=`
      <div class="rc">
        <div class="cl">Долг лизинга</div>
        <div class="cv">${fmt(r.debt)}</div>
      </div>

      <div class="rc">
        <div class="cl">Аванс</div>
        <div class="cv">${fmt(r.advance)}</div>
        <div class="cs">${(r.advPct*100).toFixed(0)}%</div>
      </div>

      <div class="rc full">
        <div class="cl">Общая сумма оплаты</div>
        <div class="cv">${fmt(r.totalPay)}</div>
      </div>

      <!-- ✅ ВМЕСТО ВНУТРЕННЕГО ДИСКОНТА -->
      <div class="fee-row">
        <div class="cl">Единоразовый % для клиента</div>
        <div class="cv">${fmtPct(r.foundDisc)}</div>
        <div class="cs">${fmt(r.discAmt)}</div>
      </div>
    `;

    /* schedule */
    document.getElementById('schedHead').innerHTML=`
      <tr><th>№</th><th>Сумма платежа</th><th>Остаток долга</th></tr>`;

    const tbody=document.getElementById('schedBody');
    tbody.innerHTML='';

    r.schedule.forEach(row=>{
      const tr=document.createElement('tr');
      tr.innerHTML=`
        <td>${row.n}</td>
        <td>${fmt(row.pay)}</td>
        <td>${fmt(row.bal)}</td>`;
      tbody.appendChild(tr);
    });

    document.getElementById('schedFoot').innerHTML=
      `<tr><td>Итого</td><td>${fmt(r.schedule._t.pay)}</td><td>—</td></tr>`;

  } else {

    cardsHTML=`
      <div class="rc">
        <div class="cl">Долг лизинга</div>
        <div class="cv">${fmt(r.debt)}</div>
      </div>

      <div class="rc">
        <div class="cl">Аванс</div>
        <div class="cv">${fmt(r.advance)}</div>
        <div class="cs">${(r.advPct*100).toFixed(0)}%</div>
      </div>

      <div class="rc">
        <div class="cl">Общая сумма оплаты</div>
        <div class="cv">${fmt(r.totalPay)}</div>
      </div>

      <div class="rc">
        <div class="cl">Ставка лизинга</div>
        <div class="cv">${fmtPct(r.flatRate)}</div>
      </div>

      <!-- ✅ ФИКС 3.5% -->
      <div class="fee-row">
        <div class="cl">Комиссия за оформление (клиент)</div>
        <div class="cv">3.50%</div>
        <div class="cs">${fmt(r.commAmt)}</div>
      </div>
    `;

    document.getElementById('schedHead').innerHTML=`
      <tr><th>№</th><th>Платёж</th><th>Осн. долг</th><th>Проценты</th><th>Остаток</th></tr>`;

    const tbody=document.getElementById('schedBody');
    tbody.innerHTML='';

    r.schedule.forEach(row=>{
      const tr=document.createElement('tr');
      tr.innerHTML=`
        <td>${row.n}</td>
        <td>${fmt(row.pay)}</td>
        <td>${fmt(row.princ)}</td>
        <td>${fmt(row.intr)}</td>
        <td>${fmt(row.bal)}</td>`;
      tbody.appendChild(tr);
    });

    const tot=r.tot;
    document.getElementById('schedFoot').innerHTML=
      `<tr><td>Итого</td><td>${fmt(tot.pay)}</td><td>${fmt(tot.princ)}</td><td>${fmt(tot.intr)}</td><td>—</td></tr>`;
  }

  document.getElementById('resultCards').innerHTML=`
    <div class="card" style="margin-bottom:11px">
      <div class="rg">${cardsHTML}</div>
    </div>`;

  document.getElementById('schedSec').style.display='block';
  document.getElementById('actBtns').classList.add('vis');
}

</script>
</body>
</html>
